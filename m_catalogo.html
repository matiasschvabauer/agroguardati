<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo (Móvil) - Agroguardati</title>
  <link rel="icon" type="image/png" href="AGLOGOCIRC.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/m_styles.css">
  <script>
    if (window.innerWidth > 768) {
        window.location.href = "catalogo.html" + window.location.search;
    }
  </script>
</head>

<body>
  <nav class="navbar">
    <div class="container">
      <a href="m_index.html" class="logo-container">
        <img src="AgroGuardatiLogo.png" alt="Agroguardati Logo">
      </a>
      <div class="menu-toggle" id="menu-toggle">
        <i class="fas fa-bars"></i>
      </div>
      <ul class="nav-links" id="nav-links">
        <li><a href="m_index.html">Inicio</a></li>
        <li><a href="m_catalogo.html">Catálogo</a></li>
        <li><a href="m_index.html#nosotros">Nosotros</a></li>
        <li><a href="m_index.html#contacto">Contacto</a></li>
      </ul>
    </div>
  </nav>

  <div class="container section" style="margin-top: 70px;">
    <h1 style="text-align: center; margin-bottom: 2rem;">Catálogo</h1>
    
    <!-- Filtros Mobile -->
    <div class="filters-bar">
      <div class="filter-group">
        <label>Categoría</label>
        <select id="filter-categoria" class="filter-select">
          <option value="todas">Todas</option>
          <option value="Tractores">Tractores</option>
          <option value="Cosechadoras">Cosechadoras</option>
          <option value="Sembradoras">Sembradoras</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Marca</label>
        <select id="filter-marca" class="filter-select">
          <option value="todas">Todas</option>
          <option value="Massey Ferguson">Massey Ferguson</option>
          <option value="Case IH">Case IH</option>
          <option value="Crucianelli">Crucianelli</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Estado</label>
        <select id="filter-estado" class="filter-select">
          <option value="todos">Todos</option>
          <option value="Nuevo">Nuevo</option>
          <option value="Usado">Usado</option>
        </select>
      </div>
    </div>

    <div id="catalog-list" class="catalog-list"></div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/m_app.js"></script>
</body>
</html>
